# =============================================================================
# 【檔案說明：analysis_options.yaml】
# 目的 (Purpose)：設定 Dart 分析器 (Analyzer) 的行為與靜態檢查規則。
# 作用 (Role)：確保團隊開發中，所有程式碼都符合一致的品質與風格規範，並能即時發現語法、邏輯或效能隱憂。
# 格式與用法 (Format/Usage)：採用 YAML 格式。透過 include 指令引用基礎規範，並在 rules 區段啟用或禁用特定的 lint 選項。
# =============================================================================

# [引用基礎規範集]
# 目的：繼承 Flutter 官方推薦的 Lint 規則集 (flutter_lints)。
# 作用：為專案提供預設的最佳開發實踐規範。
include: package:flutter_lints/flutter.yaml

# [分析器進階設定]
analyzer:
  # 目的：排除特定檔案或目錄的檢查（例如由程式碼產生器產生的檔案）。
  exclude:
    - "**/*.g.dart"
    - "build/**"

# [程式碼風格規則 (Linter Rules)]
# 目的：針對本專案的需求，定義或微調特定的風格規則。
# 格式：鍵值對 (key: value)，value 為 true 或 false。
linter:
  rules:
    # 常用規則自定義：
    # avoid_print: false       # 允許在除錯時使用 print
    # prefer_single_quotes: true # 統一使用單引號字串，使程式碼更為整潔
    # camel_case_types: true     # 強制類別名稱使用大駝峰命名法
