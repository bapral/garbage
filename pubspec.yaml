# =============================================================================
# 【檔案說明：pubspec.yaml】
# 目的 (Purpose)：定義 Flutter 專案的核心元數據、資源路徑與外部依賴關係。
# 作用 (Role)：作為專案管理的核心，控制編譯環境、套件版本以及 App 的基本識別資訊。
# 格式與用法 (Format/Usage)：採用 YAML 格式，嚴格遵守縮排。主要區塊包含專案資訊、環境、依賴項與資源定義。
# =============================================================================

# [專案基本資訊]
# 目的：設定 App 的唯一識別名稱與描述。
# 用法：name 需為小寫加底線；version 格式為「版號+內部版本號」。
name: ntpc_garbage_map
description: "台灣五都垃圾車即時位置與清運班表整合地圖專案。"

# 防止意外發佈至 pub.dev 平台。
publish_to: 'none'

# 專案版本號：[語意化版本]+[內部建置序號]
version: 1.0.0+6

# [環境設定]
# 目的：限制執行本專案所需的 Dart SDK 最低版本。
# 格式：使用 ^ 符號表示相容於該主要版本。
environment:
  sdk: ^3.11.4

# [依賴項區段 (Dependencies)]
# 目的：定義應用程式運行時必須包含的外部函式庫與 SDK。
# 作用：自動下載並連結指定的第三方套件，如地圖、網路請求與資料庫。
dependencies:
  flutter:
    sdk: flutter

  # 各式功能組件
  cupertino_icons: ^1.0.8    # iOS 風格圖示
  flutter_riverpod: ^3.3.1   # 狀態管理框架
  flutter_map: ^8.2.2        # 互動式地圖元件
  latlong2: ^0.9.1           # 地理座標計算工具
  http: ^1.6.0               # REST API 網路請求
  geolocator: ^14.0.2        # 獲取 GPS 位置資訊
  intl: ^0.20.2              # 國際化與時間格式化
  sqflite: ^2.4.1            # 本地 SQLite 資料庫 (Android/iOS)
  sqflite_common_ffi: ^2.3.3  # 桌面平台 (Windows/Linux) 資料庫支援
  path: ^1.9.0               # 跨平台檔案路徑處理
  package_info_plus: ^8.2.1  # 獲取 App 安裝包資訊
  csv: ^6.0.0                # 解析新北市等政府提供的 CSV 格式資料

# [開發依賴項 (Dev Dependencies)]
# 目的：定義僅在開發、測試或靜態檢查時需要的工具，不會被包裝進最終的 App 中。
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0      # 程式碼品質與風格檢查工具

# [Flutter 特定資源設定]
# 目的：宣告 App 需要使用的圖片、字體與 Material 設計屬性。
flutter:
  uses-material-design: true  # 啟用 Material Design 視覺設計規範
