<!DOCTYPE html>
<html>
<head>
  <!--
    如果您在非根路徑下託管 Web 應用程序，請更改下方的 href 值以反映您託管的基礎路徑。

    下方提供的路徑必須以斜槓 "/" 開頭和結尾才能正常工作。

    更多詳細信息：
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    這是基礎 href 的佔位符，在 `flutter build` 時會被 `--base-href` 參數的值替換。
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS 元標記和圖標 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ntpc_garbage_map">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- 網站圖標 (Favicon) -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ntpc_garbage_map</title>
  <!-- Web 應用清單，用於 PWA 支持 -->
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    您可以自定義 "flutter_bootstrap.js" 腳本。
    這對於向 Flutter 加載器提供自定義配置，或在初始化過程中向用戶提供反饋非常有用。

    更多詳細信息：
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
