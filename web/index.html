<!DOCTYPE html>
<html>
<head>
  <!--
    目的：Web 應用程式的主 HTML 模板 (Main HTML Template)
    作用：提供 Web 端應用的載入基座，定義基礎路徑 (Base HREF)、SEO 元標記、PWA 清單、iOS 專用圖標，並啟動 Flutter 引導腳本。
    格式與用法：標準 HTML5 文件。開發者可在此處自定義網頁標題、新增自定義字型、CSS 樣式或第三方 JavaScript 程式庫。
  -->

  <!--
    如果您在非根路徑下託管 Web 應用程式，請更改下方的 href 值以反映您託管的基礎路徑。
    下方路徑必須以斜線 "/" 開頭和結尾才能正常工作。
    這是基礎 href 的佔位符，在 `flutter build` 時會被 `--base-href` 參數的值替換。
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS 元標記和圖示 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ntpc_garbage_map">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- 網站圖示 (Favicon) -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ntpc_garbage_map</title>
  <!-- Web 應用清單，用於 PWA (Progressive Web App) 支援 -->
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    您可以自定義 "flutter_bootstrap.js" 腳本。
    這對於向 Flutter 載入器提供自定義配置，或在初始化過程中向用戶提供反饋非常有用。

    更多詳細資訊：
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
